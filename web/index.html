<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAIS ROOM — Instagram Queue</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg2: #111;
      --bg3: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --cream: #C9BFA8;
      --cream-dim: rgba(201,191,168,0.5);
      --white: #fff;
      --muted: rgba(255,255,255,0.45);
      --green: #4ade80;
      --red: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--white); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 32px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px); z-index: 100;
    }
    .logo { font-size: 18px; font-weight: 800; letter-spacing: 6px; color: var(--cream); text-transform: uppercase; }
    .queue-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--muted); }
    .queue-badge span { color: var(--cream); font-weight: 600; }

    .layout { display: grid; grid-template-columns: 1fr 360px; height: calc(100vh - 65px); }

    /* ── Movie grid ── */
    .movies-panel { overflow-y: auto; padding: 24px 32px; border-right: 1px solid var(--border); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .panel-title { font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
    .search-input {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      padding: 7px 12px; color: var(--white); font-size: 13px; width: 200px; outline: none;
    }
    .search-input:focus { border-color: var(--cream-dim); }
    .search-input::placeholder { color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

    .card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover { border-color: rgba(201,191,168,0.3); transform: translateY(-2px); }
    .card.selected { border-color: var(--cream); }
    .card.queued { border-color: rgba(74,222,128,0.4); }
    .card-video-wrap { position: relative; aspect-ratio: 9/16; background: #000; overflow: hidden; }
    .card-video-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-badges { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
    .badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; }
    .badge-rendered { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
    .badge-queued { background: rgba(201,191,168,0.15); color: var(--cream); border: 1px solid var(--cream-dim); }
    .card-body { padding: 12px; }
    .card-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 11px; color: var(--muted); }

    /* ── Detail panel ── */
    .detail-panel { overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
    .detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 13px; gap: 8px; text-align: center; }
    .detail-empty-icon { font-size: 32px; opacity: 0.3; }
    .detail-video-wrap { aspect-ratio: 9/16; background: #000; border-radius: 12px; overflow: hidden; }
    .detail-video-wrap video { width: 100%; height: 100%; object-fit: cover; }
    .detail-title { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    .detail-meta { font-size: 13px; color: var(--muted); line-height: 1.8; margin-top: 8px; }
    .detail-meta strong { color: rgba(255,255,255,0.7); }
    .genres { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .genre-tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    /* ── Section label ── */
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

    /* ── Selected track display ── */
    .selected-track-box {
      display: flex; align-items: center; gap: 10px;
      background: rgba(201,191,168,0.07); border: 1px solid var(--cream-dim);
      border-radius: 10px; padding: 10px 12px;
    }
    .selected-track-box .track-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .selected-track-box .track-meta { font-size: 11px; color: var(--muted); }
    .selected-track-box .btn-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; }
    .selected-track-box .btn-clear:hover { color: var(--red); }
    .no-track-label { font-size: 13px; color: var(--muted); font-style: italic; }

    /* ── Music subtabs ── */
    .music-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
    .music-tab { padding: 8px 14px; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
    .music-tab.active { color: var(--cream); border-bottom-color: var(--cream); }
    .music-tab-content { display: none; }
    .music-tab-content.active { display: block; }

    /* ── Jamendo search ── */
    .jamendo-search { display: flex; gap: 8px; margin-bottom: 12px; }
    .jamendo-input {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; color: var(--white); font-size: 13px; outline: none;
    }
    .jamendo-input:focus { border-color: var(--cream-dim); }
    .jamendo-input::placeholder { color: var(--muted); }
    .btn-search {
      background: var(--cream); color: #111; border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 12px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; cursor: pointer;
    }
    .btn-search:hover { opacity: 0.85; }
    .btn-search:disabled { opacity: 0.4; cursor: not-allowed; }

    .mood-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .mood-tag {
      font-size: 11px; padding: 4px 10px; border-radius: 20px; cursor: pointer;
      border: 1px solid var(--border); color: var(--muted); background: var(--bg2);
      transition: all 0.15s; user-select: none;
    }
    .mood-tag:hover { border-color: var(--cream-dim); color: var(--cream); }
    .mood-tag.active { border-color: var(--cream); color: var(--cream); background: rgba(201,191,168,0.08); }

    /* ── Track results ── */
    .track-results { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
    .track-result {
      display: grid; grid-template-columns: 36px 1fr auto;
      align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; transition: border-color 0.15s;
    }
    .track-result:hover { border-color: rgba(201,191,168,0.2); }
    .track-result.active-preview { border-color: var(--cream-dim); }
    .play-btn {
      width: 36px; height: 36px; border-radius: 50%; background: var(--bg3);
      border: 1px solid var(--border); color: var(--white); cursor: pointer;
      font-size: 12px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .play-btn:hover { background: rgba(201,191,168,0.15); }
    .play-btn.playing { background: rgba(201,191,168,0.15); border-color: var(--cream-dim); }
    .track-info { min-width: 0; }
    .track-result-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-result-meta { font-size: 11px; color: var(--muted); }
    .btn-use {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; cursor: pointer; white-space: nowrap;
      transition: all 0.15s; flex-shrink: 0;
    }
    .btn-use:hover { border-color: var(--cream); color: var(--cream); }
    .btn-use.loading { opacity: 0.5; cursor: wait; }
    .jamendo-status { font-size: 12px; color: var(--muted); padding: 8px 0; text-align: center; }
    .jamendo-error { font-size: 12px; color: var(--red); padding: 8px; background: rgba(248,113,113,0.06); border-radius: 6px; }
    .jamendo-setup { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .jamendo-setup a { color: var(--cream); }
    .jamendo-setup code { background: var(--bg3); padding: 1px 5px; border-radius: 3px; font-size: 11px; }

    /* ── Local files ── */
    .local-track-list { display: flex; flex-direction: column; gap: 6px; }
    .track-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color 0.15s; font-size: 13px;
    }
    .track-item:hover { border-color: var(--cream-dim); }
    .track-item.selected { border-color: var(--cream); background: rgba(201,191,168,0.06); }
    .track-item .track-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .no-tracks { font-size: 12px; color: var(--muted); padding: 8px 0; line-height: 1.6; }

    /* ── Render / progress ── */
    .progress-bar-wrap { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--cream); border-radius: 4px; transition: width 0.3s; }
    .progress-label { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .rendered-preview { aspect-ratio: 9/16; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(74,222,128,0.3); margin-bottom: 12px; }
    .rendered-preview video { width: 100%; height: 100%; object-fit: cover; }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary { background: var(--cream); color: #111; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--white); }
    .btn-green { background: var(--green); color: #0a1a0a; }
    .btn-red { background: transparent; border: 1px solid rgba(248,113,113,0.4); color: var(--red); }

    /* ── Main tabs ── */
    .tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab { padding: 10px 16px; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { color: var(--cream); border-bottom-color: var(--cream); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Queue ── */
    .queue-items { display: flex; flex-direction: column; gap: 8px; }
    .queue-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg2); border: 1px solid rgba(74,222,128,0.2); border-radius: 8px; font-size: 13px; }
    .queue-item-title { flex: 1; }
    .queue-remove { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; opacity: 0.6; padding: 2px 6px; }
    .queue-remove:hover { opacity: 1; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #111; border-radius: 50%; animation: spin 0.6s linear infinite; }
  </style>
</head>
<body>

<header>
  <div class="logo">CAIS ROOM</div>
  <div class="queue-badge">Queue: <span id="queueCount">0</span></div>
</header>

<div class="layout">
  <div class="movies-panel">
    <div class="panel-header">
      <div class="panel-title">Films (<span id="movieCount">…</span>)</div>
      <input class="search-input" type="text" placeholder="Search…" id="searchInput" />
    </div>
    <div class="grid" id="movieGrid"></div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">
      <div class="detail-empty-icon">🎬</div>
      <div>Select a film to get started</div>
    </div>
  </div>
</div>

<audio id="previewAudio" style="display:none"></audio>

<script>
const API = 'http://localhost:3333';

let movies = [];
let tracks = [];
let selectedMovie = null;
let selectedTrack = null; // { url, name, artist }
let activeJob = null;
let pollInterval = null;
let activeMusicTab = 'jamendo';
let jamendoResults = [];
let jamendoQuery = '';
let jamendoActiveTags = new Set();
let jamendoSearching = false;
let jamendoError = null;
let nowPlayingId = null;

const MOOD_TAGS = [
  { label: 'Cinematic', value: 'cinematic' },
  { label: 'Ambient', value: 'ambient' },
  { label: 'Dramatic', value: 'dramatic' },
  { label: 'Dark', value: 'dark' },
  { label: 'Epic', value: 'epic' },
  { label: 'Piano', value: 'piano' },
  { label: 'Electronic', value: 'electronic' },
  { label: 'Orchestral', value: 'orchestral' },
  { label: 'Experimental', value: 'experimental' },
  { label: 'Melancholic', value: 'melancholic' },
];

// ── Boot ────────────────────────────────────────────────────────────────

async function boot() {
  await Promise.all([loadMovies(), loadTracks()]);
  loadQueue();
}

async function loadMovies() {
  try {
    const res = await fetch(`${API}/api/movies`);
    movies = await res.json();
    renderGrid(movies);
    document.getElementById('movieCount').textContent = movies.length;
  } catch (e) {
    document.getElementById('movieGrid').innerHTML =
      '<p style="color:var(--red);font-size:13px">Could not load movies. Is the server running?</p>';
  }
}

async function loadTracks() {
  try {
    const res = await fetch(`${API}/api/tracks`);
    tracks = await res.json();
  } catch (e) { tracks = []; }
}

async function loadQueue() {
  try {
    const res = await fetch(`${API}/api/queue`);
    const q = await res.json();
    document.getElementById('queueCount').textContent = q.length;
  } catch(e) {}
}

// ── Grid ────────────────────────────────────────────────────────────────

function renderGrid(list) {
  const grid = document.getElementById('movieGrid');
  grid.innerHTML = '';
  for (const m of list) {
    const card = document.createElement('div');
    card.className = 'card' +
      (selectedMovie?.id === m.id ? ' selected' : '') +
      (m.queued ? ' queued' : '');
    card.innerHTML = `
      <div class="card-video-wrap">
        <video src="${m.loop_video_url}" autoplay muted loop playsinline></video>
        <div class="card-badges">
          ${m.rendered ? '<span class="badge badge-rendered">✓ Rendered</span>' : ''}
          ${m.queued ? '<span class="badge badge-queued">Queued</span>' : ''}
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">${m.director} · ${m.country}</div>
      </div>
    `;
    card.addEventListener('click', () => selectMovie(m));
    grid.appendChild(card);
  }
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  renderGrid(movies.filter(m =>
    m.title.toLowerCase().includes(q) ||
    m.director.toLowerCase().includes(q) ||
    m.country.toLowerCase().includes(q)
  ));
});

// ── Select movie ────────────────────────────────────────────────────────

function selectMovie(m) {
  selectedMovie = m;
  selectedTrack = null;
  activeJob = null;
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  stopPreview();

  fetch(`${API}/api/rendered/${m.id}`)
    .then(r => r.json())
    .then(d => {
      selectedMovie = { ...selectedMovie, rendered: d.rendered, renderedUrl: d.url };
      renderDetail();
    });

  const q = document.getElementById('searchInput').value.toLowerCase();
  renderGrid(movies.filter(m => !q || m.title.toLowerCase().includes(q) || m.director.toLowerCase().includes(q)));
  renderDetail();
}

// ── Detail panel ────────────────────────────────────────────────────────

function renderDetail() {
  if (!selectedMovie) return;
  const m = selectedMovie;
  const panel = document.getElementById('detailPanel');

  panel.innerHTML = `
    <div class="detail-video-wrap">
      <video src="${m.loop_video_url}" autoplay muted loop playsinline></video>
    </div>

    <div>
      <div class="detail-title">${m.title}</div>
      <div class="detail-meta">
        <div><strong>Director</strong> ${m.director}</div>
        <div><strong>Country</strong> ${m.country} · ${m.release_year}</div>
        <div><strong>Duration</strong> ${m.duration} min</div>
      </div>
      <div class="genres">
        ${(m.genres || []).map(g => `<span class="genre-tag">${g}</span>`).join('')}
      </div>
    </div>

    <div>
      <div class="tabs">
        <div class="tab active" data-tab="Render">Render</div>
        <div class="tab" data-tab="Queue">Queue</div>
      </div>
      <div id="tabRender" class="tab-content active" style="padding-top:16px">
        ${renderTrackPicker()}
        <div id="renderSection" style="margin-top:16px">${renderRenderSection()}</div>
      </div>
      <div id="tabQueue" class="tab-content" style="padding-top:16px">
        ${renderQueueSection()}
      </div>
    </div>
  `;

  // Main tabs
  panel.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      panel.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      panel.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      panel.querySelector(`#tab${tab.dataset.tab}`).classList.add('active');
    });
  });

  bindTrackPicker();
  bindRenderSection();
}

// ── Track picker ─────────────────────────────────────────────────────────

function renderTrackPicker() {
  const sel = selectedTrack;
  return `
    <div class="section-label">Audio Track</div>

    <!-- Selected track display -->
    <div style="margin-bottom:12px">
      ${sel
        ? `<div class="selected-track-box">
             <span style="font-size:18px">🎵</span>
             <div style="min-width:0">
               <div class="track-name">${sel.name}</div>
               <div class="track-meta">${sel.artist}</div>
             </div>
             <button class="btn-clear" id="btnClearTrack">✕</button>
           </div>`
        : `<div class="no-track-label">No audio selected</div>`
      }
    </div>

    <!-- Sub-tabs -->
    <div class="music-tabs">
      <div class="music-tab ${activeMusicTab === 'jamendo' ? 'active' : ''}" data-mtab="jamendo">Search Jamendo</div>
      <div class="music-tab ${activeMusicTab === 'local' ? 'active' : ''}" data-mtab="local">My Files</div>
    </div>

    <!-- Jamendo tab -->
    <div class="music-tab-content ${activeMusicTab === 'jamendo' ? 'active' : ''}" id="mtabJamendo">
      ${renderJamendoTab()}
    </div>

    <!-- Local files tab -->
    <div class="music-tab-content ${activeMusicTab === 'local' ? 'active' : ''}" id="mtabLocal">
      ${renderLocalTab()}
    </div>
  `;
}

function renderJamendoTab() {
  return `
    <div class="jamendo-search">
      <input class="jamendo-input" id="jamendoInput" type="text" placeholder="Search music…" value="${jamendoQuery}" />
      <button class="btn-search" id="btnJamendoSearch" ${jamendoSearching ? 'disabled' : ''}>
        ${jamendoSearching ? '<span class="spinner"></span>' : 'Search'}
      </button>
    </div>
    <div class="mood-tags">
      ${MOOD_TAGS.map(t => `
        <span class="mood-tag ${jamendoActiveTags.has(t.value) ? 'active' : ''}" data-tag="${t.value}">${t.label}</span>
      `).join('')}
    </div>
    ${renderJamendoResults()}
  `;
}

function renderJamendoResults() {
  if (jamendoError) {
    if (jamendoError.includes('JAMENDO_CLIENT_ID')) {
      return `<div class="jamendo-setup">
        <p style="margin-bottom:8px">Para buscar músicas, adicione sua chave Jamendo ao <code>.env</code>:</p>
        <ol style="padding-left:16px;line-height:2">
          <li>Acesse <a href="https://devportal.jamendo.com" target="_blank">devportal.jamendo.com</a> e crie uma conta grátis</li>
          <li>Crie um app e copie o <strong>Client ID</strong></li>
          <li>Adicione ao <code>.env</code>: <code>JAMENDO_CLIENT_ID=seu_id</code></li>
          <li>Reinicie o servidor (<code>npm run web</code>)</li>
        </ol>
      </div>`;
    }
    return `<div class="jamendo-error">❌ ${jamendoError}</div>`;
  }
  if (jamendoSearching) return `<div class="jamendo-status">Buscando…</div>`;
  if (!jamendoResults.length && (jamendoQuery || jamendoActiveTags.size)) {
    return `<div class="jamendo-status">Nenhum resultado.</div>`;
  }
  if (!jamendoResults.length) {
    return `<div class="jamendo-status" style="color:var(--muted)">Escolha um mood ou digite para buscar.</div>`;
  }

  return `<div class="track-results">
    ${jamendoResults.map(t => `
      <div class="track-result ${nowPlayingId === t.id ? 'active-preview' : ''}" data-id="${t.id}">
        <button class="play-btn ${nowPlayingId === t.id ? 'playing' : ''}" data-stream="${t.audio}" data-id="${t.id}">
          ${nowPlayingId === t.id ? '⏹' : '▶'}
        </button>
        <div class="track-info">
          <div class="track-result-name">${t.name}</div>
          <div class="track-result-meta">${t.artist_name} · ${formatDuration(t.duration)}</div>
        </div>
        <button class="btn-use" data-stream="${t.audio}" data-name="${t.name}" data-artist="${t.artist_name}">Use</button>
      </div>
    `).join('')}
  </div>`;
}

function renderLocalTab() {
  if (!tracks.length) {
    return `<div class="no-tracks">
      Coloque arquivos <code>.mp3</code> ou <code>.wav</code> na pasta <code>tracks/</code> e eles aparecerão aqui.
    </div>`;
  }
  return `<div class="local-track-list">
    <div class="track-item ${!selectedTrack ? 'selected' : ''}" data-local="" >
      <span style="font-size:16px">🔇</span>
      <span class="track-name" style="color:var(--muted);font-style:italic">Sem áudio</span>
    </div>
    ${tracks.map(t => `
      <div class="track-item ${selectedTrack?.url === t.url ? 'selected' : ''}" data-local="${t.url}" data-name="${t.name}">
        <span style="font-size:16px">🎵</span>
        <span class="track-name">${t.name}</span>
      </div>
    `).join('')}
  </div>`;
}

function bindTrackPicker() {
  const panel = document.getElementById('detailPanel');

  // Clear track
  panel.querySelector('#btnClearTrack')?.addEventListener('click', () => {
    selectedTrack = null;
    refreshTrackPicker();
  });

  // Music sub-tabs
  panel.querySelectorAll('.music-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeMusicTab = tab.dataset.mtab;
      refreshTrackPicker();
    });
  });

  // Mood tags
  panel.querySelectorAll('.mood-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const v = tag.dataset.tag;
      if (jamendoActiveTags.has(v)) jamendoActiveTags.delete(v);
      else jamendoActiveTags.add(v);
      doJamendoSearch();
    });
  });

  // Jamendo search
  const input = panel.querySelector('#jamendoInput');
  const btnSearch = panel.querySelector('#btnJamendoSearch');
  if (input) {
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doJamendoSearch(); });
    input.addEventListener('input', e => { jamendoQuery = e.target.value; });
  }
  if (btnSearch) btnSearch.addEventListener('click', doJamendoSearch);

  // Play buttons
  panel.querySelectorAll('.play-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const stream = btn.dataset.stream;
      if (nowPlayingId === id) stopPreview();
      else startPreview(id, stream);
    });
  });

  // Use buttons (Jamendo)
  panel.querySelectorAll('.btn-use').forEach(btn => {
    btn.addEventListener('click', async () => {
      btn.classList.add('loading');
      btn.textContent = '…';
      try {
        const res = await fetch(`${API}/api/music/cache`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ streamUrl: btn.dataset.stream, name: btn.dataset.name, artist: btn.dataset.artist }),
        });
        const { url } = await res.json();
        selectedTrack = { url: `${API}${url}`, name: btn.dataset.name, artist: btn.dataset.artist };
        stopPreview();
        await loadTracks();
        refreshTrackPicker();
      } catch (e) {
        btn.textContent = '✕';
      }
    });
  });

  // Local track items
  panel.querySelectorAll('[data-local]').forEach(item => {
    item.addEventListener('click', () => {
      const url = item.dataset.local;
      if (!url) { selectedTrack = null; }
      else { selectedTrack = { url: `${API}${url}`, name: item.dataset.name, artist: 'Local' }; }
      refreshTrackPicker();
    });
  });
}

function refreshTrackPicker() {
  const renderSection = document.getElementById('renderSection');
  // Re-render just the track picker area + rebind
  const panel = document.getElementById('detailPanel');
  // Find the track picker container (it's the 3rd child div of detailPanel)
  const trackPickerDiv = panel.children[2]?.querySelector('#tabRender > div:first-child');
  if (!trackPickerDiv) { renderDetail(); return; }

  // Rebuild the entire tabRender content
  const tabRender = document.getElementById('tabRender');
  if (tabRender) {
    tabRender.innerHTML = renderTrackPicker() + `<div id="renderSection" style="margin-top:16px">${renderRenderSection()}</div>`;
    bindTrackPicker();
    bindRenderSection();
  }
}

// ── Jamendo search ───────────────────────────────────────────────────────

async function doJamendoSearch() {
  jamendoSearching = true;
  jamendoError = null;
  refreshJamendoResults();

  const q = jamendoQuery;
  const tags = [...jamendoActiveTags].join(' ');
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (tags) params.set('tags', tags);

  try {
    const res = await fetch(`${API}/api/music/search?${params}`);
    const data = await res.json();
    if (data.error) {
      jamendoError = data.hint || data.error;
      jamendoResults = [];
    } else {
      jamendoResults = data;
    }
  } catch (e) {
    jamendoError = String(e);
    jamendoResults = [];
  }

  jamendoSearching = false;
  refreshJamendoResults();
}

function refreshJamendoResults() {
  const container = document.getElementById('mtabJamendo');
  if (!container) return;
  container.innerHTML = renderJamendoTab();
  bindJamendoEvents(container);
}

function bindJamendoEvents(container) {
  const input = container.querySelector('#jamendoInput');
  const btn = container.querySelector('#btnJamendoSearch');
  if (input) {
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doJamendoSearch(); });
    input.addEventListener('input', e => { jamendoQuery = e.target.value; });
  }
  if (btn) btn.addEventListener('click', doJamendoSearch);
  container.querySelectorAll('.mood-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const v = tag.dataset.tag;
      if (jamendoActiveTags.has(v)) jamendoActiveTags.delete(v);
      else jamendoActiveTags.add(v);
      doJamendoSearch();
    });
  });
  container.querySelectorAll('.play-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (nowPlayingId === btn.dataset.id) stopPreview();
      else startPreview(btn.dataset.id, btn.dataset.stream);
    });
  });
  container.querySelectorAll('.btn-use').forEach(btn => {
    btn.addEventListener('click', async () => {
      btn.classList.add('loading'); btn.textContent = '…';
      try {
        const res = await fetch(`${API}/api/music/cache`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ streamUrl: btn.dataset.stream, name: btn.dataset.name, artist: btn.dataset.artist }),
        });
        const { url } = await res.json();
        selectedTrack = { url: `${API}${url}`, name: btn.dataset.name, artist: btn.dataset.artist };
        stopPreview();
        await loadTracks();
        refreshTrackPicker();
      } catch (e) { btn.textContent = '✕'; }
    });
  });
}

// ── Audio preview ────────────────────────────────────────────────────────

function startPreview(id, streamUrl) {
  stopPreview();
  nowPlayingId = id;
  const audio = document.getElementById('previewAudio');
  audio.src = streamUrl;
  audio.play();
  audio.onended = () => { nowPlayingId = null; refreshJamendoResults(); };
  refreshJamendoResults();
}

function stopPreview() {
  const audio = document.getElementById('previewAudio');
  audio.pause();
  audio.src = '';
  nowPlayingId = null;
}

// ── Render section ───────────────────────────────────────────────────────

function renderRenderSection() {
  const m = selectedMovie;
  if (activeJob) {
    const { status, progress } = activeJob;
    if (status === 'rendering' || status === 'pending') {
      return `
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${progress}%"></div></div>
        <div class="progress-label">Rendering… ${progress}%</div>
      `;
    }
    if (status === 'error') {
      return `
        <div style="color:var(--red);font-size:13px;margin-bottom:12px">❌ ${activeJob.error}</div>
        <button class="btn btn-primary" id="btnRender">Re-render</button>
      `;
    }
  }
  if (m.rendered && m.renderedUrl) {
    return `
      <div class="rendered-preview"><video src="${m.renderedUrl}" controls muted loop playsinline></video></div>
      <button class="btn btn-outline" id="btnRender" style="margin-bottom:8px">Re-render</button>
      ${m.queued
        ? `<button class="btn btn-red" id="btnUnapprove">Remove from Queue</button>`
        : `<button class="btn btn-green" id="btnApprove">✓ Approve for Instagram</button>`
      }
    `;
  }
  return `<button class="btn btn-primary" id="btnRender">Render Trailer</button>`;
}

function renderQueueSection() {
  const q = movies.filter(m => m.queued);
  if (!q.length) return `<p style="color:var(--muted);font-size:13px">Nenhum filme na fila ainda.</p>`;
  return `
    <div class="queue-items">
      ${q.map(m => `
        <div class="queue-item">
          <span>${m.rendered ? '✅' : '⏳'}</span>
          <span class="queue-item-title">${m.title}</span>
          <button class="queue-remove" data-id="${m.id}">✕</button>
        </div>
      `).join('')}
    </div>
    <p style="margin-top:12px;font-size:12px;color:var(--muted)">Instagram posting em breve.</p>
  `;
}

function bindRenderSection() {
  const panel = document.getElementById('detailPanel');
  panel.querySelector('#btnRender')?.addEventListener('click', startRender);
  panel.querySelector('#btnApprove')?.addEventListener('click', approveForQueue);
  panel.querySelector('#btnUnapprove')?.addEventListener('click', removeFromQueue);
}

function updateRenderSection() {
  const el = document.getElementById('renderSection');
  if (el) { el.innerHTML = renderRenderSection(); bindRenderSection(); }
}

// ── Render ───────────────────────────────────────────────────────────────

async function startRender() {
  document.getElementById('btnRender')?.setAttribute('disabled', '');
  try {
    const res = await fetch(`${API}/api/render`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ movieId: selectedMovie.id, audioUrl: selectedTrack?.url }),
    });
    const { jobId } = await res.json();
    activeJob = { status: 'pending', progress: 0 };
    updateRenderSection();

    pollInterval = setInterval(async () => {
      const j = await (await fetch(`${API}/api/render/${jobId}`)).json();
      activeJob = j;
      updateRenderSection();
      if (j.status === 'done' || j.status === 'error') {
        clearInterval(pollInterval); pollInterval = null;
        if (j.status === 'done') {
          const d = await (await fetch(`${API}/api/rendered/${selectedMovie.id}`)).json();
          selectedMovie = { ...selectedMovie, rendered: d.rendered, renderedUrl: d.url };
          await loadMovies();
        }
        updateRenderSection();
      }
    }, 800);
  } catch (e) {
    activeJob = { status: 'error', error: String(e) };
    updateRenderSection();
  }
}

// ── Queue actions ────────────────────────────────────────────────────────

async function approveForQueue() {
  await fetch(`${API}/api/queue`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ movieId: selectedMovie.id }),
  });
  selectedMovie = { ...selectedMovie, queued: true };
  movies = movies.map(m => m.id === selectedMovie.id ? { ...m, queued: true } : m);
  loadQueue(); renderDetail(); renderGrid(movies);
}

async function removeFromQueue() {
  await fetch(`${API}/api/queue/${selectedMovie.id}`, { method: 'DELETE' });
  selectedMovie = { ...selectedMovie, queued: false };
  movies = movies.map(m => m.id === selectedMovie.id ? { ...m, queued: false } : m);
  loadQueue(); renderDetail(); renderGrid(movies);
}

// ── Utils ────────────────────────────────────────────────────────────────

function formatDuration(secs) {
  const m = Math.floor(secs / 60), s = secs % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

boot();
</script>
